name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: brew install ffmpeg
      - name: Install Python dependencies
        run: python -m pip install -e ".[web,dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q
